name: Deploy 4.6.0-LIVE

on:
  push:
    paths:
      - '.github/workflows/deploy-4.6.0-live.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Release Artifacts
        run: |
          mkdir release_pack
          # Copy Data
          cp -r 4.6.0/LIVE/data release_pack/
          # Copy user.cfg
          cp 4.6.0/LIVE/user.cfg release_pack/
          
          # Zip it up
          cd release_pack
          zip -r ../ScCompLangPackRemix-4.6.0-LIVE.zip data user.cfg
          cd ..
          
          echo "Created zip: ScCompLangPackRemix-4.6.0-LIVE.zip"
          unzip -l ScCompLangPackRemix-4.6.0-LIVE.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: 4.6.0-LIVE
          name: 4.6.0-LIVE
          body: |
            # ScCompLangPackRemix 4.6.0-LIVE
            
            **Latest release for Star Citizen Alpha 4.6.0 LIVE**
            
            This release contains the remixed language pack with functional component naming.
            
            ## Features
            - Functional prefixes for missiles (IR/EM/CS)
            - Ground missile prefixes (G-IR/G-EM/G-CS)
            - Component class/size/grade prefixes
            - Custom branding: "BeltaKoda's ScCompLangPackRemix"
            
            ## Installation
            1. Download `ScCompLangPackRemix-4.6.0-LIVE.zip`
            2. Extract to your Star Citizen LIVE folder (`C:\Program Files\Roberts Space Industries\StarCitizen\LIVE`)
            3. Ensure `data` folder and `user.cfg` are in the root of LIVE.
          files: ScCompLangPackRemix-4.6.0-LIVE.zip
          make_latest: true
          draft: false
          prerelease: false
